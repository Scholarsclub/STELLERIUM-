<!DOCTYPE html>
<html>
<head>
    <title>STELLERIUM | Pricing</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* HEADER */
header{
    position:fixed;
    width:100%;
    top:0;
    backdrop-filter: blur(15px);
    background:rgba(0,0,0,0.35);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:1000;
}

.nav{
    max-width:1300px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo{
    font-family:'Orbitron';
    font-size:26px;
    letter-spacing:5px;
    font-weight:900;
}

nav{
    display:flex;
    flex-wrap:wrap;
}

nav a{
    color:#ddd;
    margin-left:25px;
    text-decoration:none;
    font-family:'Orbitron';
    letter-spacing:2px;
    font-size:14px;
    transition:0.3s;
}

nav a:hover{
    color:white;
    text-shadow:0 0 15px white;
}

/* PRICING SECTION */
.pricing-section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:140px 20px 60px 20px;
}

.card{
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);
    padding:50px 40px;
    border-radius:20px;
    transition:0.5s;
    width:100%;
    max-width:500px;
    text-align:center;
}

.card:hover{
    box-shadow:0 0 60px rgba(255,255,255,0.4);
    transform:translateY(-8px);
}

.sub{
    letter-spacing:3px;
    color:#aaa;
    font-size:14px;
}

.price{
    font-family:'Orbitron';
    font-size:clamp(48px,8vw,85px);
    margin:20px 0;
    text-shadow:0 0 50px rgba(255,255,255,0.6);
}

.features{
    margin-top:30px;
    line-height:2;
    letter-spacing:1.5px;
    color:#ccc;
    font-size:14px;
}

.btn{
    margin-top:40px;
    padding:14px 35px;
    border:1px solid rgba(255,255,255,0.3);
    background:rgba(0,0,0,0.4);
    color:white;
    text-decoration:none;
    font-family:'Orbitron';
    letter-spacing:2px;
    border-radius:12px;
    transition:0.4s;
    display:inline-block;
    font-size:14px;
}

.btn:hover{
    background:white;
    color:black;
    box-shadow:0 0 40px white;
}

/* TABLET */
@media (max-width: 992px){
    nav a{
        margin-left:15px;
        font-size:12px;
    }

    .card{
        padding:40px 30px;
    }
}

/* MOBILE */
@media (max-width: 600px){

    .nav{
        flex-direction:column;
        gap:15px;
        padding:15px;
    }

    nav{
        justify-content:center;
        gap:10px;
    }

    nav a{
        margin-left:0;
    }

    .pricing-section{
        padding:160px 15px 50px 15px;
    }

    .card{
        padding:35px 20px;
    }

    .features{
        font-size:13px;
    }

    .btn{
        padding:12px 25px;
        font-size:12px;
    }
}
</style>
</head>

<body>

<header>
    <div class="nav">
        <div class="logo">STELLERIUM</div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="services.html">SERVICES</a>
            <a href="gallery.html">GALLERY</a>
            <a href="pricing.html">PRICING</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>
</header>

<section class="pricing-section">

    <div class="card">
        <div class="sub">PREMIUM EXPERIENCE</div>
        <div class="price">$15,000</div>

        <div class="features">
            ✔ Full Dome Projection Setup <br>
            ✔ 360° Spatial Visual Mapping <br>
            ✔ Cinematic Installation Design <br>
            ✔ 3D Pre-Visualization <br>
            ✔ On-site Technical Team <br>
            ✔ Custom Content Production
        </div>

        <a href="contact.html" class="btn">BOOK EXPERIENCE</a>
    </div>

</section>

</body>
</html>
