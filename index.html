<!DOCTYPE html>
<html>
<head>
    <title>STELLERIUM | Futuristic Projection Mapping</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Poppins', sans-serif;
            background:black;
            color:white;
            overflow-x:hidden;
            cursor:none;
        }

        /* SCROLL PROGRESS BAR */
        #progressBar{
            position:fixed;
            top:0;
            left:0;
            height:4px;
            width:0%;
            background:linear-gradient(90deg,#ffffff,#888);
            z-index:9999;
        }

        /* VIDEO BG */
        .video-bg{
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            object-fit:cover;
            z-index:-3;
        }

        .overlay{
            position:fixed;
            width:100%;height:100%;
            background:radial-gradient(circle at center, rgba(0,0,0,0.4), rgba(0,0,0,0.95));
            z-index:-2;
        }

        canvas{position:fixed;top:0;left:0;z-index:-1;}

        /* MOUSE GLOW */
        .cursor-glow{
            position:fixed;
            width:320px;
            height:320px;
            border-radius:50%;
            background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
            pointer-events:none;
            transform:translate(-50%,-50%);
            z-index:9998;
        }

        /* NAVBAR */
        header{
            position:fixed;
            width:100%;
            top:0;
            backdrop-filter: blur(15px);
            background:rgba(0,0,0,0.35);
            border-bottom:1px solid rgba(255,255,255,0.1);
            z-index:1000;
        }

        .nav{
            display:flex;
            justify-content:space-between;
            padding:22px 60px;
            align-items:center;
        }

        .logo{
            font-family:'Orbitron';
            font-size:30px;
            letter-spacing:6px;
            font-weight:900;
            text-shadow:0 0 25px rgba(255,255,255,0.4);
        }

        nav a{
            color:#ddd;
            margin-left:35px;
            text-decoration:none;
            font-family:'Orbitron';
            letter-spacing:2px;
            transition:0.3s;
        }

        nav a:hover{
            color:white;
            text-shadow:0 0 15px white;
        }

        /* HERO */
        .hero{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:0 20px;
        }

        .hero-content{
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:30px;
            max-width:1000px;
        }

        .hero h1{
            font-family:'Orbitron';
            font-size:clamp(60px, 10vw, 120px);
            letter-spacing:12px;
            line-height:1.1;
            text-shadow:0 0 60px rgba(255,255,255,0.5);
        }

        .typing{
            font-size:clamp(18px, 2.2vw, 28px);
            color:#cfcfcf;
            min-height:40px;
            letter-spacing:3px;
        }

        .btn{
            margin-top:10px;
            padding:18px 55px;
            border:1px solid rgba(255,255,255,0.3);
            background:rgba(0,0,0,0.4);
            color:white;
            text-decoration:none;
            font-family:'Orbitron';
            letter-spacing:3px;
            border-radius:14px;
            transition:0.4s;
            position:relative;
        }

        .btn:hover{
            background:white;
            color:black;
            box-shadow:0 0 40px white;
        }

        /* FLOATING GLASS PANELS */
        .floating{
            position:absolute;
            bottom:60px;
            width:100%;
            display:flex;
            justify-content:center;
            gap:30px;
            flex-wrap:wrap;
            padding:0 20px;
        }

        .glass{
            backdrop-filter:blur(20px);
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.12);
            padding:18px 28px;
            border-radius:16px;
            font-family:'Orbitron';
            letter-spacing:2px;
            transition:0.4s;
        }

        .glass:hover{
            transform:translateY(-8px);
            box-shadow:0 0 30px rgba(255,255,255,0.25);
        }

        /* STATS SECTION */
        .stats{
            padding:140px 10%;
            text-align:center;
            background:black;
        }

        .stats h2{
            font-family:'Orbitron';
            font-size:clamp(40px,6vw,70px);
            margin-bottom:70px;
            letter-spacing:6px;
        }

        .stat-grid{
            display:flex;
            justify-content:center;
            gap:100px;
            flex-wrap:wrap;
        }

        .stat h3{
            font-size:70px;
            font-family:'Orbitron';
        }

        .stat p{
            color:#aaa;
            margin-top:10px;
            letter-spacing:2px;
        }

        /* SCROLL REVEAL */
        .reveal{
            opacity:0;
            transform:translateY(80px);
            transition:1s ease;
        }

        .reveal.active{
            opacity:1;
            transform:translateY(0);
        }
    </style>
</head>
<body>

<div id="progressBar"></div>
<div class="cursor-glow" id="glow"></div>

<!-- VIDEO -->
<video autoplay muted loop class="video-bg">
    <source src="BG1.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<canvas id="stars"></canvas>

<header>
    <div class="nav">
        <div class="logo">STELLERIUM</div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="services.html">SERVICES</a>
            <a href="gallery.html">GALLERY</a>
            <a href="contact.html">CONTACT</a>
            <a href="pricing.html">PRICING</a>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>STELLERIUM</h1>
        <div class="typing" id="typing"></div>
        <a href="services.html" class="btn">ENTER EXPERIENCE</a>
    </div>
</section>

<div class="floating">
    <div class="glass">DOME MAPPING</div>
    <div class="glass">360° IMMERSIVE</div>
    <div class="glass">SPATIAL PROJECTION</div>
</div>

<section class="stats reveal">
    <h2>GLOBAL IMPACT</h2>
    <div class="stat-grid">
        <div class="stat">
            <h3 id="count1">0</h3>
            <p>INSTALLATIONS</p>
        </div>
        <div class="stat">
            <h3 id="count2">0</h3>
            <p>EVENTS</p>
        </div>
        <div class="stat">
            <h3 id="count3">0</h3>
            <p>COUNTRIES</p>
        </div>
    </div>
</section>

<script>
/* SCROLL PROGRESS */
window.addEventListener("scroll",()=>{
    let scrollTop=document.documentElement.scrollTop;
    let height=document.documentElement.scrollHeight - document.documentElement.clientHeight;
    let scrolled=(scrollTop/height)*100;
    document.getElementById("progressBar").style.width=scrolled+"%";
});

/* STARFIELD */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let stars=[];
for(let i=0;i<180;i++){
    stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
}
function animateStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
        s.y+=0.25;
        if(s.y>canvas.height){s.y=0;}
    });
    requestAnimationFrame(animateStars);
}
animateStars();

/* MOUSE GLOW */
document.addEventListener("mousemove",(e)=>{
    const glow=document.getElementById("glow");
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
});

/* TYPING EFFECT */
const texts=["IMMERSIVE PROJECTION","DOME MAPPING","360° SPATIAL VISUALS","CINEMATIC INSTALLATIONS"];
let i=0,j=0,current="";
function type(){
    if(j<texts[i].length){
        current+=texts[i][j];
        document.getElementById("typing").innerHTML=current;
        j++;
        setTimeout(type,60);
    }else{
        setTimeout(()=>{
            current="";
            j=0;
            i=(i+1)%texts.length;
            type();
        },1500);
    }
}
type();

/* MAGNETIC BUTTON */
const btn=document.querySelector(".btn");
btn.addEventListener("mousemove",(e)=>{
    const rect=btn.getBoundingClientRect();
    const x=e.clientX-rect.left-rect.width/2;
    const y=e.clientY-rect.top-rect.height/2;
    btn.style.transform=`translate(${x*0.15}px, ${y*0.15}px)`;
});
btn.addEventListener("mouseleave",()=>{
    btn.style.transform="translate(0,0)";
});

/* COUNTERS */
function animateCount(id,target){
    let count=0;
    let inc=target/100;
    let interval=setInterval(()=>{
        count+=inc;
        if(count>=target){count=target;clearInterval(interval);}
        document.getElementById(id).innerText=Math.floor(count)+"+";
    },20);
}
animateCount("count1",120);
animateCount("count2",350);
animateCount("count3",18);

/* SCROLL REVEAL */
const reveals=document.querySelectorAll(".reveal");
window.addEventListener("scroll",()=>{
    reveals.forEach(r=>{
        let top=r.getBoundingClientRect().top;
        if(top<window.innerHeight-100){
            r.classList.add("active");
        }
    });
});
</script>

</body>
</html>
