<!DOCTYPE html>
<html>
<head>
    <title>STELLERIUM | Futuristic Projection Mapping</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:black;
            color:white;
            overflow-x:hidden;
        }

        /* ================= HEADER ================= */

        header{
            position:fixed;
            width:100%;
            top:0;
            left:0;
            backdrop-filter: blur(15px);
            background:rgba(0,0,0,0.35);
            border-bottom:1px solid rgba(255,255,255,0.1);
            z-index:1000;
        }

        .nav{
            max-width:1200px;
            margin:auto;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 30px; /* SAME SIDE PADDING */
        }

        .logo{
            font-family:'Orbitron';
            font-size:26px;
            letter-spacing:5px;
            font-weight:900;
        }

        nav{
            display:flex;
            flex-wrap:wrap;
        }

        nav a{
            color:#ddd;
            margin-left:25px;
            text-decoration:none;
            font-family:'Orbitron';
            letter-spacing:2px;
            font-size:14px;
            transition:0.3s;
        }

        nav a:hover{
            color:white;
            text-shadow:0 0 15px white;
        }

        /* ================= HERO ================= */

        .hero{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:140px 30px 80px 30px; /* SAME SIDE PADDING */
        }

        .hero-content{
            max-width:900px;
        }

        .hero h1{
            font-family:'Orbitron';
            font-size:clamp(42px,8vw,110px);
            letter-spacing:8px;
            line-height:1.1;
            text-shadow:0 0 60px rgba(255,255,255,0.5);
        }

        .hero p{
            margin-top:20px;
            font-size:clamp(16px,2.5vw,22px);
            letter-spacing:2px;
            color:#ccc;
        }

        .btn{
            margin-top:40px;
            padding:14px 35px;
            border:1px solid rgba(255,255,255,0.3);
            background:rgba(0,0,0,0.4);
            color:white;
            text-decoration:none;
            font-family:'Orbitron';
            letter-spacing:2px;
            border-radius:12px;
            transition:0.4s;
            display:inline-block;
            font-size:14px;
        }

        .btn:hover{
            background:white;
            color:black;
            box-shadow:0 0 40px white;
        }

        /* ================= TABLET ================= */

        @media (max-width: 992px){

            nav a{
                margin-left:15px;
                font-size:12px;
            }
        }

        /* ================= MOBILE ================= */

        @media (max-width: 600px){

            .nav{
                flex-direction:column;
                gap:15px;
                padding:20px 30px;
            }

            nav{
                justify-content:center;
                gap:10px;
            }

            nav a{
                margin-left:0;
            }

            .hero{
                padding:160px 30px 60px 30px;
            }

            .hero h1{
                letter-spacing:4px;
            }
        }

    </style>
</head>

<body>

<header>
    <div class="nav">
        <div class="logo">STELLERIUM</div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="services.html">SERVICES</a>
            <a href="gallery.html">GALLERY</a>
            <a href="pricing.html">PRICING</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>STELLERIUM</h1>
        <p>Immersive Projection • Dome Mapping • 360° Spatial Visual Experiences</p>
        <a href="pricing.html" class="btn">VIEW PRICING</a>
    </div>
</section>

</body>
</html>
