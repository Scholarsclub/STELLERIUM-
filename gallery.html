<!DOCTYPE html>
<html>
<head>
    <title>STELLERIUM | Gallery</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:black;
            color:white;
            overflow-x:hidden;
        }

        /* ================= HEADER ================= */

        header{
            position:fixed;
            width:100%;
            top:0;
            left:0;
            backdrop-filter: blur(15px);
            background:rgba(0,0,0,0.35);
            border-bottom:1px solid rgba(255,255,255,0.1);
            z-index:1000;
        }

        .nav{
            max-width:1200px;
            margin:auto;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 30px; /* SAME SIDE PADDING */
        }

        .logo{
            font-family:'Orbitron';
            font-size:26px;
            letter-spacing:5px;
            font-weight:900;
        }

        nav{
            display:flex;
            flex-wrap:wrap;
        }

        nav a{
            color:#ddd;
            margin-left:25px;
            text-decoration:none;
            font-family:'Orbitron';
            letter-spacing:2px;
            font-size:14px;
            transition:0.3s;
        }

        nav a:hover{
            color:white;
            text-shadow:0 0 15px white;
        }

        /* ================= GALLERY SECTION ================= */

        .gallery-section{
            min-height:100vh;
            padding:140px 30px 80px 30px; /* SAME LEFT & RIGHT */
        }

        .gallery-section h1{
            text-align:center;
            font-family:'Orbitron';
            font-size:clamp(32px,5vw,60px);
            letter-spacing:6px;
            margin-bottom:50px;
        }

        .gallery-grid{
            max-width:1200px;
            margin:auto;
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:25px;
        }

        .gallery-item{
            position:relative;
            overflow:hidden;
            border-radius:15px;
            border:1px solid rgba(255,255,255,0.15);
            background:rgba(255,255,255,0.05);
            transition:0.4s ease;
        }

        .gallery-item img{
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
            transition:0.4s ease;
        }

        .gallery-item:hover{
            box-shadow:0 0 40px rgba(255,255,255,0.4);
        }

        .gallery-item:hover img{
            transform:scale(1.05);
        }

        /* ================= TABLET ================= */

        @media (max-width: 992px){
            .gallery-grid{
                grid-template-columns:repeat(2, 1fr);
            }

            nav a{
                margin-left:15px;
                font-size:12px;
            }
        }

        /* ================= MOBILE ================= */

        @media (max-width: 600px){

            .nav{
                flex-direction:column;
                gap:15px;
                padding:20px 30px;
            }

            nav{
                justify-content:center;
                gap:10px;
            }

            nav a{
                margin-left:0;
            }

            .gallery-grid{
                grid-template-columns:1fr;
            }
        }

    </style>
</head>

<body>

<header>
    <div class="nav">
        <div class="logo">STELLERIUM</div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="services.html">SERVICES</a>
            <a href="gallery.html">GALLERY</a>
            <a href="pricing.html">PRICING</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>
</header>

<section class="gallery-section">

    <h1>OUR WORK</h1>

    <div class="gallery-grid">
        <!-- Replace image paths with your actual images -->
        <div class="gallery-item">
            <img src="images/gallery1.jpg" alt="Projection Mapping 1">
        </div>

        <div class="gallery-item">
            <img src="images/gallery2.jpg" alt="Projection Mapping 2">
        </div>

        <div class="gallery-item">
            <img src="images/gallery3.jpg" alt="Projection Mapping 3">
        </div>

        <div class="gallery-item">
            <img src="images/gallery4.jpg" alt="Projection Mapping 4">
        </div>

        <div class="gallery-item">
            <img src="images/gallery5.jpg" alt="Projection Mapping 5">
        </div>

        <div class="gallery-item">
            <img src="images/gallery6.jpg" alt="Projection Mapping 6">
        </div>
    </div>

</section>

</body>
</html>
