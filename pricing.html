<!DOCTYPE html>
<html>
<head>
    <title>STELLERIUM | Pricing</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        body{
            font-family:'Poppins', sans-serif;
            background:black;
            color:white;
            overflow-x:hidden;
        }

        header{
            position:fixed;
            width:100%;
            top:0;
            backdrop-filter: blur(15px);
            background:rgba(0,0,0,0.35);
            border-bottom:1px solid rgba(255,255,255,0.1);
            z-index:1000;
        }

        .nav{
            display:flex;
            justify-content:space-between;
            padding:22px 60px;
            align-items:center;
        }

        .logo{
            font-family:'Orbitron';
            font-size:30px;
            letter-spacing:6px;
            font-weight:900;
        }

        nav a{
            color:#ddd;
            margin-left:35px;
            text-decoration:none;
            font-family:'Orbitron';
            letter-spacing:2px;
            transition:0.3s;
        }

        nav a:hover{
            color:white;
            text-shadow:0 0 15px white;
        }

        .pricing-section{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
            padding-top:120px;
        }

        .pricing-section h1{
            font-family:'Orbitron';
            font-size:clamp(50px,6vw,80px);
            letter-spacing:8px;
            margin-bottom:50px;
        }

        .card{
            backdrop-filter:blur(20px);
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.15);
            padding:60px 80px;
            border-radius:20px;
            transition:0.5s;
            width:500px;
            max-width:90%;
        }

        .card:hover{
            box-shadow:0 0 50px rgba(255,255,255,0.4);
            transform:translateY(-12px);
        }

        .price{
            font-family:'Orbitron';
            font-size:90px;
            margin:20px 0;
            text-shadow:0 0 40px rgba(255,255,255,0.5);
        }

        .sub{
            letter-spacing:3px;
            color:#aaa;
        }

        .features{
            margin-top:40px;
            line-height:2.2;
            letter-spacing:2px;
            color:#ccc;
        }

        .btn{
            margin-top:50px;
            padding:18px 55px;
            border:1px solid rgba(255,255,255,0.3);
            background:rgba(0,0,0,0.4);
            color:white;
            text-decoration:none;
            font-family:'Orbitron';
            letter-spacing:3px;
            border-radius:14px;
            transition:0.4s;
            display:inline-block;
        }

        .btn:hover{
            background:white;
            color:black;
            box-shadow:0 0 40px white;
        }
    </style>
</head>

<body>

<header>
    <div class="nav">
        <div class="logo">STELLERIUM</div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="services.html">SERVICES</a>
            <a href="gallery.html">GALLERY</a>
            <a href="pricing.html">PRICING</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>
</header>

<section class="pricing-section">

    <div class="card">
        <div class="sub">PREMIUM EXPERIENCE</div>
        <div class="price">$15,000</div>

        <div class="features">
            ✔ Full Dome Projection Setup <br>
            ✔ 360° Spatial Visual Mapping <br>
            ✔ Cinematic Installation Design <br>
            ✔ 3D Pre-Visualization <br>
            ✔ On-site Technical Team <br>
            ✔ Custom Content Production
        </div>

        <a href="contact.html" class="btn">BOOK EXPERIENCE</a>
    </div>

</section>

</body>
</html>
